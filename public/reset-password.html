<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Reset Password – TTSA</title>
  <link rel="icon" type="image/svg+xml" href="/img/logo.svg"/>
  <link rel="stylesheet" href="/css/global.css"/>
  <style>
    body { background: linear-gradient(135deg,#e8f2fc 0%,#f9fafb 100%); min-height:100vh; display:flex; flex-direction:column; }
    .auth-page { flex:1; display:flex; align-items:center; justify-content:center; padding: 40px 24px; }
    .auth-card { background:var(--white); border-radius:var(--radius-xl); box-shadow:var(--shadow-lg); width:100%; max-width:420px; overflow:hidden; }
    .auth-header { background:var(--blue); padding:28px; text-align:center; }
    .auth-header h1 { color:#fff; font-size:1.3rem; margin:0; }
    .auth-header p  { color:rgba(255,255,255,.7); font-size:.82rem; margin-top:4px; }
    .auth-body { padding:28px; }
    .otp-inputs { display:flex; gap:12px; justify-content:center; margin-bottom:20px; }
    .otp-inputs input { width:56px; height:64px; text-align:center; font-size:1.8rem; font-weight:700; border:2px solid var(--gray-300); border-radius:var(--radius); background:var(--white); color:var(--gray-800); }
    .otp-inputs input:focus { border-color:var(--blue); outline:none; box-shadow:0 0 0 4px var(--blue-light); }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>New Password</h1>
      <p>Enter your 4-digit code and a new password</p>
    </div>
    <div class="auth-body">
      <div id="errBox" class="alert alert-error" style="display:none"></div>
      <div id="succBox" class="alert alert-success" style="display:none"></div>
      <form id="resetForm">
        <label class="form-label" style="text-align:center">4-Digit Reset Code<span class="required">*</span></label>
        <div class="otp-inputs" id="otpGroup">
          <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" required/>
          <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" required/>
          <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" required/>
          <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" required/>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="newPassword">New Password<span class="required">*</span></label>
          <input id="newPassword" type="password" class="form-control" placeholder="Minimum 8 characters" required minlength="8"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm New Password<span class="required">*</span></label>
          <input id="confirmPassword" type="password" class="form-control" placeholder="Repeat new password" required minlength="8"/>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%" id="submitBtn">Update Password</button>
      </form>
      <div style="margin-top:20px; text-align:center;">
        <a href="/login.html" class="btn btn-ghost" style="width:100%; justify-content:center;">← Back to Login</a>
      </div>
    </div>
  </div>
</div>
<script src="/js/api.js?v=2"></script>
<script>
const email = new URLSearchParams(location.search).get('email');
if (!email) location.href = '/forgot-password.html';

const inputs = Array.from(document.querySelectorAll('#otpGroup input'));
inputs.forEach((input, index) => {
  input.addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/[^0-9]/g, '');
    if (e.target.value && index < inputs.length - 1) inputs[index + 1].focus();
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !e.target.value && index > 0) inputs[index - 1].focus();
  });
  // Handle paste
  input.addEventListener('paste', (e) => {
    e.preventDefault();
    const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
    if (!pasted) return;
    for (let i = 0; i < inputs.length; i++) {
      if (i < pasted.length) {
        inputs[i].value = pasted[i];
        if (i < inputs.length - 1) inputs[i + 1].focus();
      }
    }
  });
});

document.getElementById('resetForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errBox');
  const succ = document.getElementById('succBox');
  
  const otp = inputs.map(i => i.value).join('');
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  
  if (otp.length !== 4) {
    err.textContent = 'Please enter the complete 4-digit code';
    err.style.display='flex';
    return;
  }
  
  if (newPassword !== confirmPassword) {
    err.textContent = 'Passwords do not match';
    err.style.display='flex';
    return;
  }

  err.style.display='none';
  btn.disabled=true; btn.textContent='Updating…';
  
  try {
    const data = await apiFetch('/auth/reset-password',{
      method:'POST',
      body: JSON.stringify({ email, otp, newPassword })
    });
    succ.textContent = data.message;
    succ.style.display='flex';
    document.getElementById('resetForm').style.display = 'none';
    
    // Redirect to login page after a short delay
    setTimeout(() => {
      location.href = '/login.html';
    }, 3000);
  } catch(ex) {
    err.textContent = ex.message || 'Reset failed';
    err.style.display='flex';
    btn.disabled=false; btn.textContent='Update Password';
  }
});
</script>
</body>
</html>
