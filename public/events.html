<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Events – TTSA</title>
  <link rel="icon" type="image/svg+xml" href="/img/logo.svg"/>
  <link rel="stylesheet" href="/css/global.css"/>
  <style>
    .page-header { background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%); color: var(--white); padding: 80px 0; text-align: center; }
    .page-header h1 { color: #fff; margin-bottom: 12px; font-size: 2.5rem; }
    .page-header p { color: rgba(255,255,255,.8); font-size: 1.1rem; max-width: 600px; margin: 0 auto; }
    .events-grid { display: grid; gap: 24px; margin-top: -40px; position: relative; }
    .event-card-lg { background: var(--white); border-radius: var(--radius-lg); padding: 32px; box-shadow: var(--shadow); border: 1px solid var(--gray-100); display: flex; gap: 32px; align-items: flex-start; }
    @media (max-width: 768px) { .event-card-lg { flex-direction: column; gap: 20px; } }
    .date-badge { flex-shrink: 0; width: 100px; height: 100px; background: var(--blue-light); border: 2px solid var(--blue); border-radius: var(--radius-lg); display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--blue); }
    .date-badge .day { font-size: 2.2rem; font-weight: 800; line-height: 1; }
    .date-badge .mon { font-size: 1rem; font-weight: 600; text-transform: uppercase; margin-top: 4px; }
    .date-badge .yr { font-size: .8rem; opacity: .8; }
    .event-content h3 { font-size: 1.5rem; color: var(--blue-dark); margin-bottom: 12px; }
    .event-content .meta { display: flex; gap: 16px; margin-bottom: 16px; font-size: .95rem; color: var(--gray-600); font-weight: 500; }
    .event-content p { color: var(--gray-700); line-height: 1.6; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand">
      <img src="/img/logo.svg" alt="TTSA Logo" onerror="this.style.display='none'"/>
    </a>
    <div class="navbar-links" id="navLinks">
      <a href="/">Home</a>
      <a href="/events.html" class="active">Events</a>
      <a href="/about.html">About</a>
      <a href="/abstract-submission.html">Abstract Submission</a>
      <a href="/register.html" class="btn-nav-red">Register</a>
      <a href="/login.html" class="btn-nav"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> Login</a>
    </div>
  </div>
</nav>

<header class="page-header">
  <div class="container">
    <h1>Upcoming Events</h1>
    <p>Stay informed about congresses, workshops, and academic activities hosted by the Tunisian Thoracic Surgery Association.</p>
  </div>
</header>

<main class="container" style="padding-bottom: 80px;">
  <div id="eventsList" class="events-grid">
    <div class="loading-center" style="padding: 60px 0;"><div class="spinner"></div></div>
  </div>
</main>

<footer class="footer">
  <div class="footer-bottom container" style="border:none">
    <p>&copy; 2026 Tunisian Thoracic Surgery Association. All rights reserved.</p>
  </div>
</footer>

<script>
function formatDateRange(start, end) {
  if (!start) return 'TBD';
  const s = new Date(start);
  if (!end) return s.toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
  const e = new Date(end);
  const sStr = s.toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
  const eStr = e.toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
  if (sStr === eStr) {
    return s.toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) + ' - ' + e.toLocaleString('en-GB', { hour:'2-digit', minute:'2-digit' });
  }
  return s.toLocaleString('en-GB', { day:'2-digit', month:'short' }) + ' - ' + e.toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}

fetch('/api/events').then(r=>r.json()).then(events => {
  const el = document.getElementById('eventsList');
  if (!events.length) {
    el.innerHTML = '<div style="text-align:center;padding:60px 0;background:#fff;border-radius:12px;box-shadow:var(--shadow)"><div style="font-size:3rem;margin-bottom:16px">📅</div><h3>No upcoming events</h3><p style="color:var(--gray-500)">Check back later for updates.</p></div>';
    return;
  }
  
  el.innerHTML = events.map(e => {
    let dtHtml = '<div class="date-badge"><div style="font-size:1.2rem;font-weight:600">TBD</div></div>';
    let timeStr = '';
    if (e.event_date) {
      const d = new Date(e.event_date);
      dtHtml = `
        <div class="date-badge">
          <div class="day">${d.getDate()}</div>
          <div class="mon">${d.toLocaleString('en',{month:'short'})}</div>
          <div class="yr">${d.getFullYear()}</div>
        </div>
      `;
      timeStr = `<span>🕒 ${d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</span>`;
    }

    return `
      <div class="event-card-lg">
        ${e.poster_url ? `<div class="event-poster" style="flex: 0 0 200px; min-width:200px;"><img src="${e.poster_url}" style="width:100%; border-radius:var(--radius-lg); box-shadow:var(--shadow-lg);"/></div>` : dtHtml}
        <div class="event-content">
          <div style="font-size:.85rem; color:var(--blue); font-weight:600; margin-bottom:8px;">${formatDateRange(e.event_date, e.event_end_date)}</div>
          <h3>${e.title}</h3>
          <div class="meta">
            ${e.location ? `<span>📍 ${e.location}</span>` : ''}
          </div>
          ${e.description ? `<p>${e.description.replace(/\n/g,'<br/>')}</p>` : ''}
        </div>
      </div>
    `;
  }).join('');
}).catch(console.error);
</script>
</body>
</html>
