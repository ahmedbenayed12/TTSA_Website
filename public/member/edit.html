<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Edit Abstract – TTSA</title>
  <link rel="stylesheet" href="/css/global.css"/>
  <style>
    .author-card .remove-btn { position:absolute;top:10px;right:10px;background:var(--red-light);color:var(--red);border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center; }
    .corresp-badge { display:inline-flex; align-items:center; gap:4px; background:#f97316; color:var(--white); border-radius:12px; padding:3px 12px; font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.02em; box-shadow:var(--shadow-sm); }
    .locked-overlay { background:var(--gray-50);border:2px solid var(--gray-200);border-radius:var(--radius-lg);padding:32px;text-align:center; }
    .affil-display { font-size:.85rem;color:var(--gray-600);margin-top:16px;padding:16px;background:var(--gray-50);border-radius:var(--radius);border:1px solid var(--gray-200); }
    .topic-label {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      cursor: pointer; font-size: .9rem; font-weight: 500;
      padding: 12px 16px; border: 2px solid var(--gray-200); border-radius: var(--radius-sm);
      transition: all .2s ease; background: var(--white); color: var(--gray-700);
      width: 100%; text-align: center; font-family: inherit;
    }
    .topic-label:hover { border-color: var(--blue); background: var(--gray-50); }
    .topic-label.selected { border-color: #f97316; background: #fff7ed; color: #c2410c; font-weight: 700; }
    .topic-label:disabled, .topic-label[disabled] { cursor: default; opacity: 0.7; }
    .topic-label.selected:disabled { opacity: 1; }
</style>
</head>
<body>
<div class="portal-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="/img/logo.svg" alt="TTSA" onerror="this.style.display='none'"/>
      <div class="sidebar-logo-text"><div class="t1">Submission Portal</div><div class="t2">Participant Area</div></div>
    </div>
    <nav class="sidebar-nav">
      <a href="/member/dashboard.html" style="justify-content:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>Dashboard</a>
      <a href="/member/submit.html" id="navNewAbsBtn" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 14px;margin:12px 0;border-radius:var(--radius);background:var(--red);color:#fff;font-weight:700;font-size:.88rem;text-decoration:none;box-shadow:var(--shadow-sm);"><span style="font-size:1.2rem;line-height:1;margin-bottom:2px;">+</span> New Abstract</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
        <div class="sidebar-user-info"><div class="u-name" id="sidebarName">Loading…</div><div class="u-role">Participant</div></div>
      </div>
      <a href="#" onclick="logout()" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 14px;background:rgba(255,255,255,0.1);color:#fff;font-weight:600;font-size:.82rem;border-radius:var(--radius-sm);margin-top:12px;text-decoration:none;transition:var(--transition);border:1px solid rgba(255,255,255,0.15);">
        Sign Out
      </a>
    </div>
  </aside>
  <main class="portal-main">
    <div class="portal-topbar">
      <h2 id="pageTitle">Abstract</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="statusBadge" class="badge"></span>
        <a href="/member/dashboard.html" class="btn btn-ghost btn-sm">← Dashboard</a>
      </div>
    </div>
    <div class="portal-body">
      <div id="errBox" class="alert alert-error" style="display:none;margin-bottom:20px"></div>
      <div id="infoBox" class="alert alert-info" style="display:none;margin-bottom:20px"></div>

      <div id="lockedBanner" style="display:none" class="alert alert-warning" >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 6px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg> This abstract is locked and cannot be edited. It is currently under review.
      </div>

      <!-- Author display removed, handled by disabled form -->
      <form id="abstractForm">
        <div class="card" style="margin-bottom:24px">
          <div class="card-header"><h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 8px; color: var(--blue);"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>Main Info</h3></div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">Presentation Type <span class="required">*</span></label>
              <select id="preference" class="form-control" onchange="updateTopics()">
                <option value="" disabled selected>Select presentation type</option>
                <option value="Oral">Oral Communication</option>
                <option value="Poster">E-Poster</option>
                <option value="Video">Video</option>
              </select>
            </div>
            <div class="form-group" id="topicContainer" style="display:none">
              <label class="form-label">Topic / Subtype <span class="required">*</span></label>
              <div id="topicGroup" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:12px; margin-top:10px;">
              </div>
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Title <span class="required">*</span></label>
              <input id="title" type="text" class="form-control" required/>
            </div>
          </div>
        </div>

        <div class="card" id="authorsCard" style="margin-bottom:24px">
          <div class="card-header">
            <h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 8px; color: var(--blue);"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Authors <span id="dragHint" style="font-size:.8rem;color:var(--gray-500);font-weight:400">(Drag ☰ to reorder)</span></h3>
            <button type="button" class="btn btn-outline btn-sm" id="addAuthorBtn" onclick="addAuthor()">+ Add Author</button>
          </div>
          <div class="card-body"><div id="authorsList"></div></div>
        </div>

        <div class="card" style="margin-bottom:24px">
          <div class="card-header"><h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 8px; color: var(--blue);"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Abstract Text</h3></div>
          <div class="card-body">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Abstract Content <span class="required">*</span> <span id="wordCountBadge" class="badge badge-blue"></span></label>
              <textarea id="main_text" class="form-control" rows="12" required oninput="updateWordCount()"></textarea>
              <div class="word-count-bar"><div class="word-count-fill" id="wcFill" style="width:0%"></div></div>
              <div class="word-count-text" id="wcText"></div>
            </div>
          </div>
        </div>

        <div id="actionBtns" style="display:flex;gap:12px;justify-content:flex-end">
          <button type="submit" class="btn btn-primary" id="saveBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>Save Changes</button>
          <button type="button" class="btn btn-danger" id="lockBtn" onclick="lockAbstract()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>Lock & Submit</button>
        </div>
      </form>
    </div>
  </main>
</div>
<script src="/js/api.js"></script>
<script>
if (!requireAuth(['member'])) throw '';
const absId = new URLSearchParams(location.search).get('id');
if (!absId) location.href = '/member/dashboard.html';

let authors = [];
let isLocked = false;
let maxWords = 300;

const statusColors = {
  Draft: 'badge-gray',
  Submitted: 'badge-blue',
  'Waiting for Review': 'badge-yellow',
  Accepted: 'badge-green',
  Refused: 'badge-red',
  'Waiting for File Upload': 'badge-orange',
  'Final File Uploaded': 'badge-purple'
};

async function init() {
  try {
    const [me, abstract, settings, allAbstracts] = await Promise.all([
      apiFetch('/auth/me'),
      apiFetch('/abstracts/'+absId),
      apiFetch('/settings'),
      apiFetch('/abstracts')
    ]);
    maxWords = parseInt(settings.max_words_per_abstract)||300;
    document.getElementById('sidebarName').textContent = me.first_name+' '+me.last_name;

    // Check if deadline passed or slots full to disable the New Abstract button
    const maxSlots = parseInt(settings.max_abstracts_per_user) || 3;
    const isFull = allAbstracts.length >= maxSlots;
    let passed = false;
    let notStarted = false;
    const now = new Date();
    if (settings.submission_start) {
      notStarted = now < new Date(settings.submission_start);
    }
    if (settings.submission_deadline) {
      const d = new Date(settings.submission_deadline);
      passed = now > d;
    }
    
    if (passed || notStarted || isFull) {
      const navBtn = document.getElementById('navNewAbsBtn');
      if (navBtn) {
        navBtn.style.pointerEvents = 'none';
        navBtn.style.opacity = '0.5';
        let titleText = '';
        if (passed) titleText = 'Deadline has passed';
        else if (notStarted) titleText = 'Submission has not started yet';
        else if (isFull) titleText = 'Maximum abstracts reached';
        navBtn.title = titleText;
      }
    }

  isLocked = !!abstract.is_locked;
  document.getElementById('pageTitle').textContent = abstract.title;
  document.getElementById('statusBadge').textContent = abstract.status;
  document.getElementById('statusBadge').className = 'badge ' + (statusColors[abstract.status] || 'badge-gray');

  if (abstract.submission_number) {
    const numBadge = document.createElement('span');
    numBadge.className = 'badge';
    numBadge.style.cssText = 'background:#fff7ed;color:#c2410c;border:1px solid #f97316;font-weight:700;margin-left:8px;';
    numBadge.textContent = '#' + abstract.submission_number;
    document.getElementById('statusBadge').after(numBadge);
  }

  document.getElementById('title').value = abstract.title;
  document.getElementById('preference').value = abstract.preference;
  updateTopics(abstract.topic ? abstract.topic.trim() : null);
  document.getElementById('main_text').value = abstract.main_text;
  updateWordCount();

  authors = abstract.authors || [];

  // Deadline check
  const nowTime = new Date();
  const notStartedTime = settings.submission_start && nowTime < new Date(settings.submission_start);
  const deadlinePassed = settings.submission_deadline && nowTime > new Date(settings.submission_deadline);

  if (isLocked || deadlinePassed || notStartedTime) {
    document.getElementById('lockedBanner').style.display='flex';
    if(notStartedTime) {
      const start = new Date(settings.submission_start);
      document.getElementById('lockedBanner').innerHTML=`<span>⏳</span> Submission has not started yet. Opens on: ${start.toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})}`;
    } else if(deadlinePassed) {
      document.getElementById('lockedBanner').innerHTML='<span>⏰</span> Submission deadline has passed.';
    }
    setReadOnly(true);
    document.getElementById('actionBtns').style.display='none';
    document.getElementById('addAuthorBtn').style.display='none';
    const dragHint = document.getElementById('dragHint');
    if (dragHint) dragHint.style.display = 'none';
  }
  
  // Always render authors, if locked they will be disabled
  renderAuthors();

  // Show upload button if Waiting for File Upload or Final File Uploaded
  if (['Waiting for File Upload', 'Final File Uploaded'].includes(abstract.status)) {
    const info = document.getElementById('infoBox');
    let uploadHtml = `🎉 Your abstract was <strong>Accepted</strong>! <a href="/member/upload.html?id=${absId}" class="btn btn-success btn-sm" style="margin-left:12px">📤 ${abstract.status === 'Final File Uploaded' ? 'Re-upload' : 'Upload'} Presentation</a>`;
    if (abstract.file_path) {
      uploadHtml += `<a href="/api/abstracts/${absId}/file" class="btn btn-outline btn-sm" style="margin-left:8px" download>💾 Download Uploaded File</a>`;
    }
    info.innerHTML = uploadHtml;
    info.className = 'alert alert-success';
    info.style.display='flex';
    setReadOnly(true); // Lock the form
    document.getElementById('actionBtns').style.display = 'none';
    document.getElementById('addAuthorBtn').style.display = 'none';
  } else if (abstract.status==='Refused') {
    const info = document.getElementById('infoBox');
    info.innerHTML = '❌ Your abstract was <strong>Refused</strong> by the scientific committee.';
    info.className = 'alert alert-error';
    info.style.display='flex';
    setReadOnly(true); // Lock the form
    document.getElementById('actionBtns').style.display = 'none';
    document.getElementById('addAuthorBtn').style.display = 'none';
  }
  } catch (err) {
    console.error(err);
    showToast('Failed to load abstract data: ' + err.message, 'error');
  }
}

// Removed showAuthorDisplay as authors are now rendered read-only directly in the form

function setReadOnly(ro) {
  ['title','main_text','preference'].forEach(id=>{ document.getElementById(id).disabled=ro; });
  // Disable topic buttons when locked
  document.querySelectorAll('#topicGroup button.topic-label').forEach(btn => { 
    if (!btn.classList.contains('selected')) {
      btn.disabled = ro; 
    }
  });
}

function addAuthor(data={}) {
  if(authors.length>=10){showToast('Max 10 authors','error');return;}
  authors.push({...data}); renderAuthors();
}

let selectedTopic = null;

function selectTopic(value, forceVisual = false) {
  // forceVisual=true is used during init to display saved topic even if locked
  if (isLocked && !forceVisual) return;
  selectedTopic = value;
  document.querySelectorAll('.topic-label').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.topic === value);
  });
  const grp = document.getElementById('topicGroup');
  if (grp) { grp.style.outline = ''; }
}

function updateTopics(initialTopic = null) {
  const pref = document.getElementById('preference').value;
  const container = document.getElementById('topicContainer');
  const group = document.getElementById('topicGroup');
  group.innerHTML = '';
  selectedTopic = null;
  
  const topicsMap = {
    'Oral': ['Chest Trauma', 'Hydatic Cyst'],
    'Poster': ['Thoracic Oncology', 'Other'],
    'Video': ['Video']
  };

  if (topicsMap[pref]) {
    if (pref === 'Video') {
      container.style.display = 'none';
      selectTopic('Video');
    } else {
      container.style.display = 'block';
      topicsMap[pref].forEach(t => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'topic-label';
        btn.dataset.topic = t;
        btn.textContent = t;
        btn.onclick = () => selectTopic(t);
        if (isLocked && t !== initialTopic) {
          btn.disabled = true;
        }
        group.appendChild(btn);
      });
      if (initialTopic && topicsMap[pref].includes(initialTopic)) {
        selectTopic(initialTopic, true);
      } else if (topicsMap[pref].length === 1 && !isLocked) {
        selectTopic(topicsMap[pref][0]);
      }
    }
  } else {
    container.style.display = 'none';
  }
}

function updateTopicVisual() { /* no-op */ }

// Wire up topic change events
document.querySelectorAll('input[name="topic"]').forEach(radio => {
  radio.addEventListener('change', updateTopicVisual);
});

function renderAuthors() {
  const list = document.getElementById('authorsList');
  if (!list) return;
  const disabledStr = isLocked ? 'disabled' : '';
  list.innerHTML = authors.map((a,i)=>`
    <div class="author-card" id="ac-${i}" ${!isLocked ? `draggable="true" ondragstart="dragStart(event, ${i})" ondragover="dragOver(event)" ondrop="drop(event, ${i})"` : ''} style="${!isLocked ? 'cursor:grab;' : ''} display:flex; align-items:center; gap:12px; padding:12px; margin-bottom:8px; border:1px solid var(--gray-200); border-radius:var(--radius-sm); background:var(--white);">
      ${!isLocked ? '<div style="color:var(--gray-400); font-size:1.2rem; cursor:grab;">☰</div>' : ''}
      <div class="author-index" style="position:static; width:24px; height:24px; font-size:.8rem; flex-shrink:0;">${i+1}</div>
      <div style="flex:1; display:flex; gap:8px;">
        <input type="text" class="form-control" style="padding:4px 8px; height:32px; font-size:.85rem;" placeholder="First Name *" value="${a.first_name||''}" onchange="authors[${i}].first_name=this.value" required ${disabledStr}/>
        <input type="text" class="form-control" style="padding:4px 8px; height:32px; font-size:.85rem;" placeholder="Last Name *" value="${a.last_name||''}" onchange="authors[${i}].last_name=this.value" required ${disabledStr}/>
        <input type="text" class="form-control" style="padding:4px 8px; height:32px; font-size:.85rem;" placeholder="Institution *" value="${a.institution||''}" onchange="authors[${i}].institution=this.value" required ${disabledStr}/>
        <input type="text" class="form-control" style="padding:4px 8px; height:32px; font-size:.85rem;" placeholder="Country *" value="${a.country||''}" onchange="authors[${i}].country=this.value" required ${disabledStr}/>
        <input type="email" class="form-control" style="padding:4px 8px; height:32px; font-size:.85rem;" placeholder="Email" value="${a.email||''}" onchange="authors[${i}].email=this.value" ${disabledStr}/>
      </div>
      ${i===0 ? '<span class="corresp-badge" style="position:static; flex-shrink:0;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="margin-right:2px;"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>Corresponding</span>' : (!isLocked ? `<button type="button" class="btn btn-danger btn-sm" style="padding:0; width:36px; height:36px; flex-shrink:0; display:flex; align-items:center; justify-content:center;" onclick="removeAuthor(${i})" title="Remove Author"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>` : '')}
    </div>`).join('');
  if (document.getElementById('addAuthorBtn')) {
    document.getElementById('addAuthorBtn').disabled = authors.length>=10 || isLocked;
  }
}

function removeAuthor(i){authors.splice(i,1);renderAuthors();}

let draggedIndex = null;
function dragStart(e, i) {
  draggedIndex = i;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/html', e.target.innerHTML);
}
function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}
function drop(e, targetIndex) {
  e.preventDefault();
  if (draggedIndex === null || draggedIndex === targetIndex) return;
  const author = authors.splice(draggedIndex, 1)[0];
  authors.splice(targetIndex, 0, author);
  renderAuthors();
}

function updateWordCount() {
  const wc=countWords(document.getElementById('main_text').value);
  const pct=Math.min(100,(wc/maxWords)*100);
  const fill=document.getElementById('wcFill');
  fill.style.width=pct+'%';
  fill.className='word-count-fill'+(pct>=100?' over':pct>=80?' warn':'');
  document.getElementById('wordCountBadge').textContent=`${wc} / ${maxWords} words`;
  document.getElementById('wordCountBadge').className='badge '+(wc>maxWords?'badge-red':wc>=maxWords*.8?'badge-yellow':'badge-blue');
  document.getElementById('wcText').textContent=wc>maxWords?`⚠️ Over by ${wc-maxWords} words`:'';
}

document.getElementById('abstractForm').addEventListener('submit', async e=>{
  e.preventDefault();
  if(isLocked)return;
  const btn=document.getElementById('saveBtn');
  const topic = selectedTopic;
  if (!document.getElementById('preference').value) {
    showToast('Please select a presentation type', 'error');
    btn.disabled=false; btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>Save Changes'; 
    return;
  }
  if (!topic) { 
    showToast('Please select a topic', 'error'); 
    document.getElementById('topicGroup').style.outline = '2px solid var(--red)';
    btn.disabled=false; btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>Save Changes'; 
    return; 
  }

  try{
    await apiFetch('/abstracts/'+absId,{method:'PUT',body:JSON.stringify({
      title:document.getElementById('title').value,
      topic:topic,
      main_text:document.getElementById('main_text').value,
      preference:document.getElementById('preference').value,
      authors
    })});
    showToast('Draft saved — Topic: ' + topic);
  }catch(ex){showToast(ex.message,'error');}
  btn.disabled=false; btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>Save Changes';
});

async function lockAbstract(){
  const topic = selectedTopic;
  if (!document.getElementById('preference').value) {
    showToast('Please select a presentation type', 'error');
    return;
  }
  if (!topic) { 
    showToast('Please select a topic', 'error'); 
    document.getElementById('topicGroup').style.outline = '2px solid var(--red)';
    return; 
  }
  if(!confirm('Lock and submit? You cannot edit after this.'))return;
  const btn=document.getElementById('lockBtn');
  btn.disabled=true; btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>Submitting…';
  try{
    // Save first
    await apiFetch('/abstracts/'+absId,{method:'PUT',body:JSON.stringify({
      title:document.getElementById('title').value,
      topic:topic,
      main_text:document.getElementById('main_text').value,
      preference:document.getElementById('preference').value,
      authors
    })});
    await apiFetch('/abstracts/'+absId+'/confirm',{method:'POST'});
    showToast('Abstract submitted and locked!');
    setTimeout(()=>location.href='/member/dashboard.html',1200);
  }catch(ex){showToast(ex.message,'error');btn.disabled=false;btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>Lock & Submit';}
}

init();
</script>
