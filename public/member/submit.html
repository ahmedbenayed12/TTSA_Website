<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Submit Abstract – TTSA</title>
  <link rel="stylesheet" href="/css/global.css"/>
  <style>
    .author-card .remove-btn { position:absolute; top:10px; right:10px; background:var(--red-light); color:var(--red); border:none; border-radius:50%; width:24px; height:24px; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; }
    .corresp-badge { display:inline-flex; align-items:center; gap:4px; background:#f97316; color:var(--white); border-radius:12px; padding:3px 12px; font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.02em; box-shadow:var(--shadow-sm); }
    .topic-label {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      cursor: pointer; font-size: .9rem; font-weight: 500;
      padding: 12px 16px; border: 2px solid var(--gray-200); border-radius: var(--radius-sm);
      transition: all .2s ease; background: var(--white); color: var(--gray-700);
      width: 100%; text-align: center; font-family: inherit;
    }
    .topic-label:hover { border-color: var(--blue); background: var(--gray-50); }
    .topic-label.selected { border-color: #f97316; background: #fff7ed; color: #c2410c; font-weight: 700; }
</style>
</head>
<body>
<div class="portal-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="/img/logo.svg" alt="TTSA" onerror="this.style.display='none'"/>
      <div class="sidebar-logo-text"><div class="t1">Submission Portal</div><div class="t2">Participant Area</div></div>
    </div>
    <nav class="sidebar-nav">
      <a href="/member/dashboard.html" style="justify-content:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>Dashboard</a>
      <a href="/member/submit.html" class="active" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 14px;margin:12px 0;border-radius:var(--radius);background:var(--red);color:#fff;font-weight:700;font-size:.88rem;text-decoration:none;box-shadow:var(--shadow-sm);"><span style="font-size:1.2rem;line-height:1;margin-bottom:2px;">+</span> New Abstract</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
        <div class="sidebar-user-info"><div class="u-name" id="sidebarName">Loading…</div><div class="u-role">Participant</div></div>
      </div>
      <a href="#" onclick="logout()" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 14px;background:rgba(255,255,255,0.1);color:#fff;font-weight:600;font-size:.82rem;border-radius:var(--radius-sm);margin-top:12px;text-decoration:none;transition:var(--transition);border:1px solid rgba(255,255,255,0.15);">
        Sign Out
      </a>
    </div>
  </aside>
  <main class="portal-main">
    <div class="portal-topbar">
      <h2>Submit New Abstract</h2>
      <a href="/member/dashboard.html" class="btn btn-ghost btn-sm">← Back</a>
    </div>
    <div class="portal-body">
      <div id="errBox" class="alert alert-error" style="display:none;margin-bottom:20px"></div>
      <div id="deadlineBox" class="alert alert-info" style="margin-bottom:20px">
        <span id="deadlineText">Loading…</span>
      </div>

      <form id="abstractForm">
        <!-- Title & Preference -->
        <div class="card" style="margin-bottom:24px">
          <div class="card-header"><h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 8px; color: var(--blue);"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>Main Info</h3></div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">Presentation Type <span class="required">*</span></label>
              <select id="preference" class="form-control" onchange="updateTopics()">
                <option value="" disabled selected>Select presentation type</option>
                <option value="Oral">Oral Communication</option>
                <option value="Poster">E-Poster</option>
                <option value="Video">Video</option>
              </select>
            </div>
            <div class="form-group" id="topicContainer" style="display:none">
              <label class="form-label">Topic / Subtype <span class="required">*</span></label>
              <div id="topicGroup" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:12px; margin-top:10px;">
              </div>
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Title <span class="required">*</span></label>
              <input id="title" type="text" class="form-control" placeholder="Enter your abstract title" required/>
            </div>
          </div>
        </div>

        <!-- Authors -->
        <div class="card" style="margin-bottom:24px">
          <div class="card-header">
            <h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 8px; color: var(--blue);"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Authors <span style="font-size:.8rem;color:var(--gray-500);font-weight:400">(Drag ☰ to reorder, 1–10 authors)</span></h3>
            <button type="button" class="btn btn-outline btn-sm" id="addAuthorBtn" onclick="addAuthor()">+ Add Author</button>
          </div>
          <div class="card-body">
            <div id="authorsList"></div>
          </div>
        </div>

        <!-- Abstract Text -->
        <div class="card" style="margin-bottom:24px">
          <div class="card-header"><h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 8px; color: var(--blue);"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Abstract Text</h3></div>
          <div class="card-body">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Abstract Content <span class="required">*</span> <span id="wordCountBadge" class="badge badge-blue" style="margin-left:8px">0 / 300 words</span></label>
              <textarea id="main_text" class="form-control" rows="12" placeholder="Enter your abstract text (maximum 300 words)…" required oninput="updateWordCount()"></textarea>
              <div class="word-count-bar"><div class="word-count-fill" id="wcFill" style="width:0%"></div></div>
              <div class="word-count-text" id="wcText"></div>
            </div>
          </div>
        </div>

        <!-- Submit -->
        <div style="display:flex;gap:12px;justify-content:flex-end">
          <button type="button" class="btn btn-ghost" onclick="location.href='/member/dashboard.html'">Cancel</button>
          <button type="submit" class="btn btn-primary" id="submitBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>Save as Draft</button>
          <button type="button" class="btn btn-danger" id="confirmBtn" onclick="confirmSubmit()" style="display:none"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>Lock & Submit</button>
        </div>
      </form>
    </div>
  </main>
</div>
<script src="/js/api.js"></script>
<script>
if (!requireAuth(['member'])) throw '';

let authors = [];
let maxWords = 300;

async function init() {
  try {
    const [me, settings, abstracts] = await Promise.all([
      apiFetch('/auth/me'),
      apiFetch('/settings'),
      apiFetch('/abstracts')
    ]);
    document.getElementById('sidebarName').textContent = me.first_name + ' ' + me.last_name;
    maxWords = parseInt(settings.max_words_per_abstract) || 300;

    // Block if slots are full
    const maxSlots = parseInt(settings.max_abstracts_per_user) || 3;
    if (abstracts.length >= maxSlots) {
      showToast('You have reached the maximum number of abstracts (' + maxSlots + ').', 'error');
      setTimeout(() => location.href = '/member/dashboard.html', 1500);
      return;
    }

    let passed = false;
    let notStarted = false;
    const now = new Date();

    if (settings.submission_start) {
      const start = new Date(settings.submission_start);
      notStarted = now < start;
    }

    if (settings.submission_deadline) {
      const d = new Date(settings.submission_deadline);
      passed = now > d;
    }

    if (notStarted) {
      const start = new Date(settings.submission_start);
      document.getElementById('deadlineText').textContent = `⏳ Submission has not started yet. Opens on: ${start.toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})}`;
      document.getElementById('deadlineBox').className = 'alert alert-warning';
      document.getElementById('submitBtn').disabled = true;
    } else if (passed) {
      document.getElementById('deadlineText').textContent = '⚠️ Submission deadline has passed. You cannot submit new abstracts.';
      document.getElementById('deadlineBox').className = 'alert alert-warning';
      document.getElementById('submitBtn').disabled = true;
    } else if (settings.submission_deadline) {
      const d = new Date(settings.submission_deadline);
      document.getElementById('deadlineText').textContent = `Submission deadline: ${d.toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'})}`;
    }

    // Pre-fill submitter as first (corresponding) author
    addAuthor({ 
      first_name: me.first_name, 
      last_name: me.last_name, 
      email: me.email, 
      institution: '', 
      country: 'Tunisia', 
      is_corresponding: true 
    });
  } catch (err) {
    console.error(err);
    showToast('Failed to load initial data: ' + err.message, 'error');
  }
}

function addAuthor(data = {}) {
  if (authors.length >= 10) { showToast('Maximum 10 authors allowed','error'); return; }
  const idx = authors.length;
  authors.push({ ...data });
  renderAuthors();
}

let selectedTopic = null;

function selectTopic(value) {
  selectedTopic = value;
  document.querySelectorAll('.topic-label').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.topic === value);
  });
  // Clear any error highlight on the topic group
  const grp = document.getElementById('topicGroup');
  if (grp) { grp.style.outline = ''; }
}

function updateTopics(initialTopic = null) {
  const pref = document.getElementById('preference').value;
  const container = document.getElementById('topicContainer');
  const group = document.getElementById('topicGroup');
  group.innerHTML = '';
  selectedTopic = null;
  
  const topicsMap = {
    'Oral': ['Chest Trauma', 'Hydatic Cyst'],
    'Poster': ['Thoracic Oncology', 'Other'],
    'Video': ['Video']
  };

  if (topicsMap[pref]) {
    if (pref === 'Video') {
      container.style.display = 'none';
      selectTopic('Video');
    } else {
      container.style.display = 'block';
      topicsMap[pref].forEach(t => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'topic-label';
        btn.dataset.topic = t;
        btn.textContent = t;
        btn.onclick = () => selectTopic(t);
        group.appendChild(btn);
      });
      if (initialTopic && topicsMap[pref].includes(initialTopic)) {
        selectTopic(initialTopic);
      } else if (topicsMap[pref].length === 1) {
        selectTopic(topicsMap[pref][0]);
      }
    }
  } else {
    container.style.display = 'none';
  }
}

function updateTopicVisual() { /* no-op, kept for compat */ }

function renderAuthors() {
  const list = document.getElementById('authorsList');
  if (!list) return;
  list.innerHTML = authors.map((a,i) => `
    <div class="author-card" id="ac-${i}" draggable="true" ondragstart="dragStart(event, ${i})" ondragover="dragOver(event)" ondrop="drop(event, ${i})" style="cursor:grab; display:flex; align-items:center; gap:12px; padding:12px; margin-bottom:8px; border:1px solid var(--gray-200); border-radius:var(--radius-sm); background:var(--white);">
      <div style="color:var(--gray-400); font-size:1.2rem; cursor:grab;">☰</div>
      <div class="author-index" style="position:static; width:24px; height:24px; font-size:.8rem; flex-shrink:0;">${i+1}</div>
      <div style="flex:1; display:flex; gap:8px;">
        <input type="text" class="form-control" style="padding:4px 8px; height:32px; font-size:.85rem;" placeholder="First Name *" value="${a.first_name||''}" onchange="updateAuthor(${i},'first_name',this.value)" required/>
        <input type="text" class="form-control" style="padding:4px 8px; height:32px; font-size:.85rem;" placeholder="Last Name *" value="${a.last_name||''}" onchange="updateAuthor(${i},'last_name',this.value)" required/>
        <input type="text" class="form-control" style="padding:4px 8px; height:32px; font-size:.85rem;" placeholder="Institution *" value="${a.institution||''}" onchange="updateAuthor(${i},'institution',this.value)" required/>
        <input type="text" class="form-control" style="padding:4px 8px; height:32px; font-size:.85rem;" placeholder="Country *" value="${a.country||''}" onchange="updateAuthor(${i},'country',this.value)" required/>
        <input type="email" class="form-control" style="padding:4px 8px; height:32px; font-size:.85rem;" placeholder="Email" value="${a.email||''}" onchange="updateAuthor(${i},'email',this.value)"/>
      </div>
      ${i===0 ? '<span class="corresp-badge" style="position:static; flex-shrink:0;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="margin-right:2px;"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>Corresponding</span>' : `<button type="button" class="btn btn-danger btn-sm" style="padding:0; width:36px; height:36px; flex-shrink:0; display:flex; align-items:center; justify-content:center;" onclick="removeAuthor(${i})" title="Remove Author"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>`}
    </div>`).join('');
  document.getElementById('addAuthorBtn').disabled = authors.length >= 10;
  const btn = document.getElementById('confirmBtn');
  btn.style.display = authors.length > 0 ? 'inline-flex' : 'none';
}

function updateAuthor(i, field, val) { authors[i][field] = val; }
function removeAuthor(i) { authors.splice(i,1); renderAuthors(); }

let draggedIndex = null;
function dragStart(e, i) {
  draggedIndex = i;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/html', e.target.innerHTML);
}
function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}
function drop(e, targetIndex) {
  e.preventDefault();
  if (draggedIndex === null || draggedIndex === targetIndex) return;
  const author = authors.splice(draggedIndex, 1)[0];
  authors.splice(targetIndex, 0, author);
  renderAuthors();
}

function updateWordCount() {
  const txt = document.getElementById('main_text').value;
  const wc = countWords(txt);
  const pct = Math.min(100, (wc/maxWords)*100);
  const fill = document.getElementById('wcFill');
  fill.style.width = pct+'%';
  fill.className = 'word-count-fill' + (pct>=100?' over':pct>=80?' warn':'');
  document.getElementById('wordCountBadge').textContent = `${wc} / ${maxWords} words`;
  document.getElementById('wordCountBadge').className = 'badge ' + (wc>maxWords?'badge-red':wc>=maxWords*0.8?'badge-yellow':'badge-blue');
  document.getElementById('wcText').textContent = wc > maxWords ? `⚠️ Over limit by ${wc-maxWords} words` : '';
}

function getFormData() {
  return {
    title: document.getElementById('title').value.trim(),
    topic: selectedTopic,
    main_text: document.getElementById('main_text').value.trim(),
    preference: document.getElementById('preference').value,
    authors
  };
}

document.getElementById('abstractForm').addEventListener('submit', async e => {
  e.preventDefault();
  const data = getFormData();
  if (!data.preference) {
    showToast('Please select a presentation type', 'error');
    return;
  }
  if (!data.topic) { 
    showToast('Please select a topic before saving', 'error');
    document.getElementById('topicGroup').style.outline = '2px solid var(--red)';
    return; 
  }
  if (!data.title) { showToast('Title is required', 'error'); return; }
  if (!data.main_text) { showToast('Abstract text is required', 'error'); return; }
  if (authors.some(a=>!a.first_name||!a.last_name||!a.institution||!a.country)) { showToast('Please fill all required author fields', 'error'); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled=true; btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>Saving…';
  try {
    const res = await apiFetch('/abstracts',{method:'POST',body:JSON.stringify(data)});
    showToast('Draft saved successfully with Topic: ' + data.topic);
    setTimeout(()=>location.href='/member/edit.html?id='+res.id, 1000);
  } catch(ex){ showToast(ex.message, 'error'); btn.disabled=false; btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>Save as Draft'; }
});

async function confirmSubmit() {
  const data = getFormData();
  if (!data.preference) {
    showToast('Please select a presentation type', 'error');
    return;
  }
  if (!data.topic) { 
    showToast('Please select a topic before submitting', 'error');
    document.getElementById('topicGroup').style.outline = '2px solid var(--red)';
    return;
  }
  if (!data.title||!data.main_text) { showToast('Please fill all required fields first', 'error'); return; }
  if (!confirm('Are you sure? Once locked, you cannot edit this abstract.')) return;
  // Save first, then confirm
  const btn = document.getElementById('confirmBtn');
  btn.disabled=true; btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>Submitting…';
  try {
    const res = await apiFetch('/abstracts',{method:'POST',body:JSON.stringify(data)});
    await apiFetch('/abstracts/'+res.id+'/confirm',{method:'POST'});
    showToast('Abstract submitted and locked!');
    setTimeout(()=>location.href='/member/dashboard.html',1200);
  } catch(ex){ showToast(ex.message, 'error'); btn.disabled=false; btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>Lock & Submit'; }
}

function showErr(msg) {
  const e=document.getElementById('errBox'); e.textContent=msg; e.style.display='flex';
  window.scrollTo({top:0,behavior:'smooth'});
}

init();
</script>
</body>
</html>
