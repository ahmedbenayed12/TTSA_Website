<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Forgot Password – TTSA</title>
  <link rel="icon" type="image/svg+xml" href="/img/logo.svg"/>
  <link rel="stylesheet" href="/css/global.css"/>
  <style>
    body { background: linear-gradient(135deg,#e8f2fc 0%,#f9fafb 100%); min-height:100vh; display:flex; flex-direction:column; }
    .auth-page { flex:1; display:flex; align-items:center; justify-content:center; padding: 40px 24px; }
    .auth-card { background:var(--white); border-radius:var(--radius-xl); box-shadow:var(--shadow-lg); width:100%; max-width:420px; overflow:hidden; }
    .auth-header { background:var(--blue); padding:28px; text-align:center; }
    .auth-header h1 { color:#fff; font-size:1.3rem; margin:0; }
    .auth-header p  { color:rgba(255,255,255,.7); font-size:.82rem; margin-top:4px; }
    .auth-body { padding:28px; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Reset Password</h1>
      <p>Enter your email to receive a reset code</p>
    </div>
    <div class="auth-body">
      <div id="errBox" class="alert alert-error" style="display:none"></div>
      <div id="succBox" class="alert alert-success" style="display:none"></div>
      <form id="forgotForm">
        <div class="form-group">
          <label class="form-label" for="email">Email Address<span class="required">*</span></label>
          <input id="email" type="email" class="form-control" placeholder="youremail@domain.com" required/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="submitBtn">Send Reset Code</button>
      </form>
      <div style="margin-top:20px; text-align:center;">
        <a href="/login.html" class="btn btn-ghost" style="width:100%; justify-content:center;">← Back to Login</a>
      </div>
    </div>
  </div>
</div>
<script src="/js/api.js?v=2"></script>
<script>
document.getElementById('forgotForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errBox');
  const succ = document.getElementById('succBox');
  err.style.display='none';
  succ.style.display='none';
  btn.disabled=true; btn.textContent='Sending…';
  
  const email = document.getElementById('email').value.trim();
  
  try {
    const data = await apiFetch('/auth/forgot-password',{
      method:'POST',
      body: JSON.stringify({ email })
    });
    succ.textContent = data.message;
    succ.style.display='flex';
    document.getElementById('forgotForm').style.display = 'none';
    
    // Redirect to reset page after a short delay
    setTimeout(() => {
      location.href = '/reset-password.html?email=' + encodeURIComponent(email);
    }, 2000);
  } catch(ex) {
    if (ex.message && ex.message.includes('not registered')) {
      err.innerHTML = 'This email is not registered. <a href="/register.html" style="text-decoration:underline; font-weight:600; color:var(--red-dark);">Create an account</a>';
    } else {
      err.textContent = ex.message || 'Request failed';
    }
    err.style.display='flex';
    btn.disabled=false; btn.textContent='Send Reset Code';
  }
});
</script>
</body>
</html>
