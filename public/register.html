<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Register – TTSA</title>

  <link rel="icon" type="image/svg+xml" href="/img/logo.svg"/>
  <link rel="stylesheet" href="/css/global.css"/>
  <style>
    body { background: linear-gradient(135deg,#e8f2fc 0%,#f9fafb 100%); min-height:100vh; display:flex; flex-direction:column; }
    .auth-page { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 24px; }
    .auth-card { background:var(--white); border-radius:var(--radius-xl); box-shadow:var(--shadow-lg); width:100%; max-width:520px; overflow:hidden; }
    .auth-header { background:var(--red); padding:28px; text-align:center; }
    .auth-header img { height:48px; margin:0 auto 12px; filter:brightness(0) invert(1); }
    .auth-header h1 { color:#fff; font-size:1.3rem; margin:0; }
    .auth-header p  { color:rgba(255,255,255,.7); font-size:.82rem; margin-top:4px; }
    .auth-body { padding:28px; }
    .step-indicator { display:flex; align-items:center; gap:0; margin-bottom:28px; }
    .step { flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; position:relative; }
    .step::after { content:''; position:absolute; top:14px; left:50%; width:100%; height:2px; background:var(--gray-200); z-index:0; }
    .step:last-child::after { display:none; }
    .step-num { width:28px; height:28px; border-radius:50%; background:var(--gray-200); color:var(--gray-500); font-size:.8rem; font-weight:700; display:flex; align-items:center; justify-content:center; position:relative; z-index:1; transition:var(--transition); }
    .step.active .step-num { background:var(--blue); color:#fff; }
    .step.done   .step-num { background:var(--success-bg); color:var(--success); }
    .step-label { font-size:.68rem; color:var(--gray-500); font-weight:500; text-align:center; }
    .step.active .step-label { color:var(--blue); font-weight:600; }
    .step-panel { display:none; }
    .step-panel.active { display:block; }
    .category-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .radio-card { position:relative; }
    .radio-card input { position:absolute; opacity:0; }
    .radio-card label {
      display:block; padding:14px 16px; border:2px solid var(--gray-200);
      border-radius:var(--radius); cursor:pointer; text-align:center;
      font-size:.87rem; font-weight:500; transition:var(--transition);
    }
    .radio-card input:checked + label { border-color:var(--blue); background:var(--blue-light); color:var(--blue); }
    .nav-btns { display:flex; justify-content:space-between; margin-top:24px; }
  </style>
</head>

<script>
let currentStep = 1;

document.querySelectorAll('input[name="nationality"]').forEach(r => {
  r.addEventListener('change', e => {
    const countrySelect = document.getElementById('country');
    if (e.target.value === 'Foreign') {
      countrySelect.disabled = false;
      countrySelect.value = '';
    } else {
      countrySelect.disabled = true;
      countrySelect.value = 'Tunisia';
    }
  });
});

document.querySelectorAll('input[name="profession"]').forEach(r => {
  r.addEventListener('change', e => {
    const nextBtn = document.getElementById('step2NextBtn');
    const si3 = document.getElementById('si-3');
    if (e.target.value === 'Paramedical') {
      nextBtn.textContent = 'Create Account';
      si3.style.opacity = '0.4';
      si3.querySelector('span').textContent = 'N/A';
    } else {
      nextBtn.textContent = 'Continue →';
      si3.style.opacity = '1';
      si3.querySelector('span').textContent = 'Category';
    }
  });
});

document.querySelectorAll('input[name="specialty"]').forEach(r => {
  r.addEventListener('change', e => {
    const group = document.getElementById('otherSpecGroup');
    group.style.display = (e.target.value === 'Other') ? 'block' : 'none';
  });
});

function handleStep2Next() {
  const profession = document.querySelector('[name=profession]:checked').value;
  if (profession === 'Paramedical') {
    submitReg();
  } else {
    goStep(3);
  }
}

async function goStep(n) {
  const err = document.getElementById('errBox');
  err.style.display='none';
  if (n > currentStep) {
    if (!validateStep(currentStep)) return;
    
    // Verify email availability before leaving Step 1
    if (currentStep === 1 && n === 2) {
      const email = document.getElementById('email').value.trim();
      try {
        const res = await apiFetch('/auth/check-email', { method: 'POST', body: JSON.stringify({ email }) });
        if (res.exists) {
          const e = document.getElementById('errBox');
          e.innerHTML = 'This email is already registered. <a href="/login.html" style="text-decoration:underline; font-weight:600; color:var(--red-dark);">Login here</a>';
          e.style.display = 'flex';
          return;
        }
      } catch (ex) {
        showErr('Could not verify email. Please try again.');
        return;
      }
    }
  }
  document.getElementById('panel-'+currentStep).classList.remove('active');
  document.getElementById('si-'+currentStep).classList.remove('active');
  document.getElementById('si-'+currentStep).classList.add('done');
  currentStep = n;
  document.getElementById('panel-'+currentStep).classList.add('active');
  document.getElementById('si-'+currentStep).classList.add('active');
  document.getElementById('si-'+currentStep).classList.remove('done');
}

function validateStep(step) {
  const err = document.getElementById('errBox');
  if (step===1) {
    if (!document.getElementById('first_name').value.trim()) { showErr('First name is required'); return false; }
    if (!document.getElementById('last_name').value.trim())  { showErr('Last name is required'); return false; }
    const email = document.getElementById('email').value.trim();
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!email) { showErr('Email is required'); return false; }
    if (!emailRegex.test(email)) { showErr('Please enter a valid email address'); return false; }
    if (document.getElementById('password').value.length < 8){ showErr('Password must be at least 8 characters'); return false; }
    if (document.getElementById('password').value !== document.getElementById('confirm_password').value) { showErr('Passwords do not match'); return false; }
  }
  if (step===2) {
    if (document.querySelector('input[name="nationality"]:checked').value === 'Foreign') {
      if (!document.getElementById('country').value) {
        showErr('Please select a country'); return false;
      }
    }
  }
  if (step===3) {
    if (document.querySelector('input[name="specialty"]:checked').value === 'Other') {
      if (!document.getElementById('specialty_details').value.trim()) {
        showErr('Please describe your specialty'); return false;
      }
    }
  }
  return true;
}

function showErr(msg) {
  const e = document.getElementById('errBox');
  e.textContent = msg; e.style.display='flex';
}

async function submitReg() {
  const profession = document.querySelector('[name=profession]:checked').value;
  if (profession === 'Medical') {
    if (!validateStep(3)) return;
  }
  
  const btnStep3 = document.getElementById('submitBtn');
  const btnStep2 = document.getElementById('step2NextBtn');
  const activeBtn = (profession === 'Medical') ? btnStep3 : btnStep2;
  
  const originalText = activeBtn.textContent;
  activeBtn.disabled=true; activeBtn.textContent='Creating account…';
  
  const body = {
    first_name:  document.getElementById('first_name').value.trim(),
    last_name:   document.getElementById('last_name').value.trim(),
    email:       document.getElementById('email').value.trim(),
    password:    document.getElementById('password').value,
    nationality: document.querySelector('[name=nationality]:checked').value,
    country:     document.getElementById('country').value,
    profession:  profession,
    specialty:   (profession === 'Medical') ? document.querySelector('[name=specialty]:checked').value : 'Other',
    specialty_details: (profession === 'Medical' && document.querySelector('[name=specialty]:checked').value === 'Other') 
                        ? document.getElementById('specialty_details').value.trim() 
                        : null,
    seniority:   (profession === 'Medical') ? document.querySelector('[name=seniority]:checked').value : 'Senior',
  };
  try {
    await apiFetch('/auth/register', { method:'POST', body: JSON.stringify(body) });
    location.href='/verify-otp.html?email='+encodeURIComponent(body.email);
  } catch(ex) {
    showErr(ex.message || 'Registration failed');
    activeBtn.disabled=false; activeBtn.textContent=originalText;
  }
}
</script>
</body>
</html>
