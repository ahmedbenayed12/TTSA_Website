<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Reviewer Dashboard – TTSA</title>
  <link rel="stylesheet" href="/css/global.css"/>
  <style>
    .assigned-card { transition: var(--transition); }
    .assigned-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .score-badge { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; font-weight: 700; font-size: .9rem; }
    .score-badge.pending { background: var(--gray-200); color: var(--gray-600); }
    .score-badge.graded { background: var(--blue); color: #fff; }
    .score-label { font-size: .75rem; color: var(--gray-500); text-transform: uppercase; letter-spacing: .05em; margin-top: 4px; text-align: center; }
  </style>
</head>
<body>
<div class="portal-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="/img/logo.svg" alt="TTSA" onerror="this.style.display='none'"/>
      <div class="sidebar-logo-text"><div class="t1">TTSA Portal</div><div class="t2">Reviewer Area</div></div>
    </div>
    <nav class="sidebar-nav">
      <a href="/reviewer/dashboard.html" class="active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg> Assignments</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar">?</div>
        <div class="sidebar-user-info"><div class="u-name" id="sidebarName">Loading…</div><div class="u-role">Reviewer</div></div>
      </div>
      <a href="#" onclick="logout()" style="display:flex;align-items:center;gap:8px;padding:8px 12px;color:rgba(255,255,255,.6);font-size:.82rem;border-radius:var(--radius-sm);margin-top:4px"><span>🚪</span> Sign Out</a>
    </div>
  </aside>
  <main class="portal-main">
    <div class="portal-topbar">
      <h2>Assigned Abstracts</h2>
    </div>
    <div class="portal-body">
      
      <div class="stat-grid" style="margin-bottom:24px">
        <div class="stat-card">
          <div class="stat-label">Total Assigned</div>
          <div class="stat-value" id="statTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pending Review</div>
          <div class="stat-value" id="statPending" style="color:var(--warning)">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Completed</div>
          <div class="stat-value" id="statDone" style="color:var(--success)">—</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>To Be Reviewed</h3>
        </div>
        <div class="card-body">
          <div id="assignmentsList" style="display:flex;flex-direction:column;gap:16px">
            <div class="loading-center"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>
<script src="/js/api.js"></script>
<script>
if (!requireAuth(['reviewer'])) throw '';

async function loadAssignments() {
  try {
    const [me, assignments] = await Promise.all([
      apiFetch('/auth/me'),
      apiFetch('/reviews/assigned')
    ]);

    document.getElementById('sidebarName').textContent = me.first_name + ' ' + me.last_name;
    document.getElementById('sidebarAvatar').textContent = me.first_name[0];

    const total = assignments.length;
    const done = assignments.filter(a => a.review_id != null).length;
    const pending = total - done;

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statPending').textContent = pending;
    document.getElementById('statDone').textContent = done;

    const list = document.getElementById('assignmentsList');
    if (assignments.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="icon">📫</div><h3>No assignments yet</h3><p>You have not been assigned any abstracts to review.</p></div>';
      return;
    }

    list.innerHTML = assignments.map(a => {
      const isDone = a.review_id != null;
      let authorStr = '';
      if (!a.blind && a.authors && a.authors.length) {
        authorStr = `<div style="font-size:.8rem;color:var(--gray-500);margin-bottom:8px">Authors: ${a.authors.map(au=>au.last_name).join(', ')}</div>`;
      } else if (a.blind) {
        authorStr = `<div style="font-size:.8rem;color:var(--gray-500);margin-bottom:8px;display:flex;align-items:center;gap:6px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>Blind Review Mode Active</div>`;
      }

      const scoreHtml = isDone 
        ? `<div style="display:flex;flex-direction:column;align-items:center"><div class="score-badge graded">${a.total_score}</div><div class="score-label">/ 20</div></div>`
        : `<div style="display:flex;flex-direction:column;align-items:center"><div class="score-badge pending">-</div><div class="score-label">Pending</div></div>`;

      let verdictBadge = '';
      if (isDone) {
        if (a.verdict==='Admitted') verdictBadge = '<span class="badge badge-green" style="margin-top:8px">Admitted</span>';
        else verdictBadge = '<span class="badge badge-red" style="margin-top:8px">Refused</span>';
      }

      return `
        <div class="card assigned-card" style="border:1px solid ${isDone?'var(--gray-200)':'var(--blue-light)'}">
          <div class="card-body" style="display:flex;gap:20px;align-items:flex-start">
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px">
                ${a.submission_number ? `<span class="badge" style="background:#fff7ed;color:#c2410c;border:1px solid #f97316;">Abstract #${a.submission_number}</span>` : `<span class="badge badge-gray">ID: ${a.id}</span>`}
                <h4 style="margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.title}</h4>
              </div>
              ${authorStr}
              <p style="font-size:.85rem;color:var(--gray-600);margin-bottom:12px">${a.main_text.substring(0,140)}...</p>
              <div style="display:flex;gap:16px;font-size:.8rem;color:var(--gray-500)">
                <span>${a.word_count} words</span>
                <span>Pref: ${a.preference}</span>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;min-width:100px;border-left:1px solid var(--gray-100);padding-left:20px">
              ${scoreHtml}
              ${verdictBadge}
              <a href="/reviewer/review.html?id=${a.id}" class="btn ${isDone?'btn-ghost':'btn-primary'} btn-sm" style="margin-top:16px;width:100%;justify-content:center">${isDone?'Edit Review':'Grade'}</a>
            </div>
          </div>
        </div>
      `;
    }).join('');

  } catch (err) {
    console.error(err);
    showToast('Failed to load assignments', 'error');
  }
}

loadAssignments();
</script>
</body>
</html>
