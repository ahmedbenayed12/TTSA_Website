<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Set New Password – TTSA Reviewer</title>
  <link rel="icon" type="image/svg+xml" href="/img/logo.svg"/>
  <link rel="stylesheet" href="/css/global.css"/>
  <style>
    body { background: linear-gradient(135deg,#e8f2fc 0%,#f9fafb 100%); min-height:100vh; display:flex; flex-direction:column; }
    .auth-page { flex:1; display:flex; align-items:center; justify-content:center; padding: 40px 24px; }
    .auth-card { background:var(--white); border-radius:var(--radius-xl); box-shadow:var(--shadow-lg); width:100%; max-width:420px; overflow:hidden; }
    .auth-header { background:var(--blue); padding:28px; text-align:center; }
    .auth-header h1 { color:#fff; font-size:1.3rem; margin:0; }
    .auth-header p  { color:rgba(255,255,255,.7); font-size:.82rem; margin-top:4px; }
    .auth-body { padding:28px; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Set Secure Password</h1>
      <p>Please update your temporary password before first use</p>
    </div>
    <div class="auth-body">
      <div id="errBox" class="alert alert-error" style="display:none;margin-bottom:16px"></div>
      <div id="successBox" class="alert alert-success" style="display:none;margin-bottom:16px"></div>
      <form id="changePasswordForm">
        <div class="form-group">
          <label class="form-label" for="newPassword">New Password<span class="required">*</span></label>
          <input id="newPassword" type="password" class="form-control" placeholder="••••••••" required minlength="8"/>
          <div class="form-hint">At least 8 characters. Make it secure.</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm New Password<span class="required">*</span></label>
          <input id="confirmPassword" type="password" class="form-control" placeholder="••••••••" required minlength="8"/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:12px" id="submitBtn">Save Password &amp; Login</button>
      </form>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
// Verify the reviewer is authenticated with their temporary token
if (!getToken() || getRole() !== 'reviewer_temp') {
  // If they don't have the temporary role, redirect them to login
  location.href = '/login.html';
}

document.getElementById('changePasswordForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const errBox = document.getElementById('errBox');
  const successBox = document.getElementById('successBox');
  
  errBox.style.display = 'none';
  successBox.style.display = 'none';

  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (newPassword !== confirmPassword) {
    errBox.textContent = 'Passwords do not match.';
    errBox.style.display = 'flex';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    const data = await apiFetch('/auth/reviewer/change-password', {
      method: 'POST',
      body: JSON.stringify({ newPassword })
    });

    successBox.textContent = 'Password updated successfully! Logging you in...';
    successBox.style.display = 'flex';
    
    // Store the permanent reviewer token
    setAuth(data.token, data.role, data.name);
    
    setTimeout(() => {
      location.href = '/reviewer/dashboard.html';
    }, 1500);
  } catch (ex) {
    errBox.textContent = ex.message || 'Failed to update password. Please try again.';
    errBox.style.display = 'flex';
    btn.disabled = false;
    btn.textContent = 'Save Password & Login';
  }
});
</script>
</body>
</html>
