<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Participant Management – TTSA Admin</title>
  <link rel="icon" type="image/svg+xml" href="/img/logo.svg"/>
  <link rel="stylesheet" href="/css/global.css"/>
  <style>
    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .user-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
      border: 1px solid var(--gray-200);
    }
    .user-table th, .user-table td {
      padding: 14px 20px;
      text-align: left;
      border-bottom: 1px solid var(--gray-200);
    }
    .user-table th {
      background: var(--gray-50);
      font-weight: 700;
      color: var(--gray-700);
      font-size: .85rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .user-table td {
      font-size: .9rem;
      color: var(--gray-600);
    }
    .user-table tr:last-child td {
      border-bottom: none;
    }
    .user-table tr:hover td {
      background: var(--gray-50);
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-active {
      background: #e1f5fe;
      color: #0288d1;
    }
    .badge-blocked {
      background: #ffebee;
      color: #c62828;
    }
    .empty-state {
      padding: 60px 20px;
      text-align: center;
      background: var(--white);
      border: 1px dashed var(--gray-300);
      border-radius: var(--radius);
      margin-top: 16px;
    }
    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }
    .empty-state h3 {
      margin: 0 0 6px;
      color: var(--gray-800);
    }
  </style>
</head>
<body>
<div class="portal-layout">
  <aside class="sidebar" style="background:var(--gray-900)">
    <div class="sidebar-logo">
      <img src="/img/logo.svg" alt="TTSA" onerror="this.style.display='none'"/>
      <div class="sidebar-logo-text"><div class="t1">TTSA Portal</div><div class="t2">Super Admin</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-nav-label">Overview</div>
      <a href="/admin/dashboard.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg> Dashboard</a>
      <div class="sidebar-nav-label">Management</div>
      <a href="/admin/abstracts.html"><span class="nav-icon">📑</span> Abstracts &amp; Reviews</a>
      <a href="/admin/reviewers.html"><span class="nav-icon">👥</span> Reviewers</a>
      <a href="/admin/users.html" class="active"><span class="nav-icon">👤</span> Participants</a>
      <a href="/admin/events.html"><span class="nav-icon">📅</span> Events</a>
      <a href="/admin/about.html"><span class="nav-icon">📖</span> About</a>
      <a href="/admin/quick-actions.html"><span class="nav-icon">⚡</span> Quick Actions</a>
      <div class="sidebar-nav-label">Configuration</div>
      <a href="/admin/export.html"><span class="nav-icon">📥</span> Export Data</a>
      <a href="/admin/settings.html"><span class="nav-icon">⚙️</span> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar" style="background:var(--blue)">?</div>
        <div class="sidebar-user-info"><div class="u-name" id="sidebarName">Loading…</div><div class="u-role">Admin</div></div>
      </div>
      <a href="#" onclick="logout()" style="display:flex;align-items:center;gap:8px;padding:8px 12px;color:rgba(255,255,255,.6);font-size:.82rem;border-radius:var(--radius-sm);margin-top:4px"><span>🚪</span> Sign Out</a>
    </div>
  </aside>
  <main class="portal-main">
    <div class="portal-topbar">
      <h2>Participant Management</h2>
    </div>
    <div class="portal-body">
      <div id="errBox" class="alert alert-error" style="display:none;margin-bottom:20px"></div>
      
      <div class="search-bar">
        <input type="text" id="searchInput" class="form-control" placeholder="Search by name or email..." style="max-width:360px" oninput="filterUsers()"/>
      </div>

      <div id="usersContainer">
        <!-- User table or empty state goes here -->
        <div class="empty-state">
          <div class="icon">👥</div>
          <h3>Loading Participants...</h3>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script>
if (!requireAuth(['admin'])) throw '';
let users = [];

async function loadUsers() {
  const me = await apiFetch('/auth/me');
  document.getElementById('sidebarName').textContent = me.first_name + ' ' + me.last_name;
  document.getElementById('sidebarAvatar').textContent = me.first_name[0];

  try {
    users = await apiFetch('/admin/users');
    renderTable(users);
  } catch (err) {
    document.getElementById('errBox').textContent = err.message;
    document.getElementById('errBox').style.display = 'flex';
  }
}

function renderTable(list) {
  const container = document.getElementById('usersContainer');
  
  if (!list.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">👥</div>
        <h3>No Participants Found</h3>
      </div>
    `;
    return;
  }

  container.innerHTML = `
    <table class="user-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Profile Info</th>
          <th>Status</th>
          <th style="text-align:right">Actions</th>
        </tr>
      </thead>
      <tbody>
        ${list.map(u => {
          const statusBadge = u.is_blocked 
            ? `<span class="badge badge-blocked">Blocked</span>` 
            : `<span class="badge badge-active">Active</span>`;
          
          const actionBtn = u.is_blocked
            ? `<button class="btn btn-outline btn-sm" onclick="toggleBlock(${u.id}, false, '${u.first_name} ${u.last_name}')">🔓 Unblock</button>`
            : `<button class="btn btn-danger btn-sm" onclick="toggleBlock(${u.id}, true, '${u.first_name} ${u.last_name}')">🔒 Block</button>`;

          return `
            <tr>
              <td><strong>${u.last_name.toUpperCase()}</strong>, ${u.first_name}</td>
              <td>${u.email}</td>
              <td>
                <div style="font-size:.8rem;color:var(--gray-500)">
                  ${u.nationality} · ${u.profession} · ${u.specialty} · ${u.seniority}
                </div>
              </td>
              <td>${statusBadge}</td>
              <td style="text-align:right">${actionBtn}</td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}

function filterUsers() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!query) {
    renderTable(users);
    return;
  }
  const filtered = users.filter(u => 
    u.first_name.toLowerCase().includes(query) ||
    u.last_name.toLowerCase().includes(query) ||
    u.email.toLowerCase().includes(query)
  );
  renderTable(filtered);
}

async function toggleBlock(id, blocked, name) {
  const actionText = blocked ? 'block' : 'unblock';
  if (!confirm(`Are you sure you want to ${actionText} participant account "${name}"?`)) {
    return;
  }

  try {
    await apiFetch(`/admin/users/${id}/block`, {
      method: 'PATCH',
      body: JSON.stringify({ blocked })
    });
    showToast(`Participant account successfully ${blocked ? 'blocked' : 'unblocked'}.`);
    loadUsers();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

loadUsers();
</script>
</body>
</html>
